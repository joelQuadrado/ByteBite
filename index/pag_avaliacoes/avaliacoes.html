<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliações - Restaurante</title>
</head>
<body>

    <header>
        <h1>Avaliações dos nossos Clientes</h1>
    </header>

    <main>
        <section id="formulario-avaliacao">
            <h2>Deixe a sua opinião</h2>

            <form> 
                <div>
                    <label for="nome">Nome do Cliente:</label><br>
                    <input type="text" id="nome" name="nome" placeholder="O seu nome completo" required>
                </div><br>

                <div>
                    <label for="Avaliação">Nota (1 a 5):</label><br>
                    <input type="Number" id="avaliacao" name="avaliacao" placeholder="Avalie a sua experiência" required>
                </div><br>

                <div>
                     <label for="comentario">A sua opinião:</label><br>
                    <textarea id="comentario" name="comentario" rows="4" cols="50" placeholder="Conte-nos a sua experiência..."></textarea>
                </div><br>

                <button type="submit">Enviar Avaliação</button>
            </form>

            </section>

        <hr> <section id="lista-criticas">
            <h2>O que dizem de nós</h2>
            </section>
    </main>

    <footer>
        <p>&copy; 2026 - Restaurante Bytebite \o/</p>
    </footer>

</body>
</html>
